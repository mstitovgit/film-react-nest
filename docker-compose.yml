networks:
  dev:

services:

  nginx:
    build: ./nginx
    networks:
    - dev
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - frontend
      - backend
    volumes:
      - frontend-dist:/usr/share/nginx/html

  frontend:
    build: ./frontend
    volumes:
      - frontend-dist:/app/dist
    networks:
    - dev


  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      # В контейнере localhost — не postgres; хост совпадает с именем сервиса в Compose
      DATABASE_URL: postgres://filmnest:filmnest@postgres:5432/film_nest
    networks:
    - dev
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    healthcheck:
      test: "wget -nv -t1 --spider 'http://localhost:3000/'"
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
  postgres:
    image: "postgres:16"
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
    - dev

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
    - dev

volumes:
  frontend-dist:
  pg-data:
  pgadmin_data: